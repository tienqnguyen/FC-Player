---
deployment:
  tasks:
    # 1. Define the deployment destination path on your cPanel server.
    # Replace 'username' with your actual cPanel username and set the appropriate folder.
    # If using cPanel Application Manager for Node.js, point this to your Node application root.
    - export DEPLOYPATH=/home/username/nodeapp

    # 2. Sync the complete "dist" folder which contains:
    #    - The client-side built assets and index.html
    #    - The compiled server bundle "server.cjs"
    - /bin/mkdir -p $DEPLOYPATH/dist
    - /bin/rsync -a --delete dist/ $DEPLOYPATH/dist/

    # 3. Copy root configurations and dependency files for Node.js to run on the server
    - /bin/cp package.json $DEPLOYPATH/
    - /bin/cp package-lock.json $DEPLOYPATH/ 2>/dev/null || :
    - /bin/cp .env.example $DEPLOYPATH/ 2>/dev/null || :

    # 4. Optional: If running directly in a Node environment on cPanel, log installation
    # - cd $DEPLOYPATH && /usr/bin/npm install --production
